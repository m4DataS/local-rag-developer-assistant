---
stages:
- sync
- test
- secret-detection
sast:
  stage: test
include:
- template: Security/SAST.gitlab-ci.yml
- template: Security/Secret-Detection.gitlab-ci.yml

variables:
  SECRET_DETECTION_ENABLED: 'true'
secret_detection:
  stage: secret-detection

mirror_to_github:
  stage: sync
  script:
    - git config --global user.email "m4data@auto.com"
    - git config --global user.name "GitLab CI"
    - GITLAB_SOURCE_USERNAME=${GITLAB_SOURCE_USERNAME::-1}
    - GITHUB_USERNAME=${GITHUB_USERNAME::-1}
    - git clone https://$GITLAB_SOURCE_USERNAME:$GITLAB_SOURCE_PAT@$GITLAB_SOURCE_PATH_RAG.git
    - cd local-rag-developer-assistant
    - git remote add github https://$GITHUB_USERNAME:$GITHUB_PAT@$GITHUB_PATH_RAG.git
    - git branch -a
    # Create local tracking branches for every origin/* ref (except HEAD)
    - |
      for b in $(git branch -r | grep -v '\->'); do
        git branch --track "${b#origin/}" "$b" || true
      done
    # Now push all *local* branches and tags
    - git push github --all --force
    - git push github --tags --force
